name: Feature request
description: Propose a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Sema makes hard or impossible today? A concrete use case beats an abstract wish.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you'd like
      description: The behavior or API you have in mind. A short Sema snippet of how it would look is ideal.
      render: scheme
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds you're using now, or other designs you weighed. Optional.
    validations:
      required: false
